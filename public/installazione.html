<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installa ServiceScore - 01Informatica</title>
    
    <!-- Collegamento al Manifest per PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0033A0">

    <!-- Meta per Web App iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ServiceScore">
    <link rel="apple-touch-icon" href="favicon.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0033A0',
                            red: '#E31837',
                            yellow: '#FFC72C',
                            dark: '#0B132B'
                        }
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-glow': 'pulse-glow 2s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        'pulse-glow': {
                            '0%, 100%': { opacity: 1, boxShadow: '0 0 20px rgba(255, 199, 44, 0.3)' },
                            '50%': { opacity: .7, boxShadow: '0 0 40px rgba(255, 199, 44, 0.6)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-brand-dark min-h-screen flex items-center justify-center p-4 overflow-hidden relative text-white">

    <!-- Sfondi animati -->
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-brand-blue rounded-full mix-blend-screen filter blur-[120px] opacity-40 animate-blob"></div>
    <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-brand-red rounded-full mix-blend-screen filter blur-[120px] opacity-40 animate-blob" style="animation-delay: 2s"></div>

    <div class="glass-panel relative z-10 w-full max-w-lg p-8 sm:p-12 rounded-[3.5rem] shadow-2xl flex flex-col items-center animate-float border-t border-l border-white/20">
        
        <!-- Logo -->
        <div class="h-16 mb-6 flex items-center justify-center">
            <span class="text-3xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-brand-yellow via-brand-red to-brand-blue drop-shadow-lg">
                01 INFORMATICA
            </span>
        </div>

        <div class="text-center space-y-2 mb-10">
            <h1 class="text-4xl font-black tracking-tighter uppercase text-white leading-none">ServiceScore</h1>
            <p class="text-slate-400 text-sm mt-4 font-bold uppercase tracking-widest text-balance">Installazione Ufficiale</p>
        </div>
        
        <!-- Blocco Dinamico Android/iOS -->
        <div id="install-container" class="w-full space-y-6">
            
            <!-- ISTRUZIONI IOS (Sempre visibili su iPhone) -->
            <div id="ios-instructions" class="hidden bg-white/5 border border-white/10 rounded-3xl p-6 text-center space-y-4">
                <div class="w-12 h-12 bg-brand-blue/20 rounded-xl flex items-center justify-center mx-auto text-brand-yellow">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                </div>
                <h3 class="font-black uppercase text-sm tracking-widest">Procedura iPhone</h3>
                <p class="text-xs text-slate-300 leading-relaxed">
                    1. Tocca il tasto <span class="text-brand-yellow font-bold">Condividi</span> in basso.<br>
                    2. Scorri e seleziona <span class="text-brand-yellow font-bold">"Aggiungi alla Home"</span>.
                </p>
            </div>

            <!-- PULSANTE ANDROID (Appare solo se supportato) -->
            <button id="install-button" class="hidden w-full bg-gradient-to-r from-brand-blue to-brand-red p-6 rounded-[2rem] font-black uppercase tracking-widest text-lg shadow-xl animate-pulse-glow transition-transform active:scale-95 border-none text-white cursor-pointer">
                Installa Ora
            </button>

            <!-- PULSANTE FALLBACK / APRI WEB -->
            <a href="https://servicescore.vercel.app" class="w-full block">
                <button class="w-full bg-white/10 border border-white/20 text-white font-black py-5 rounded-[2rem] hover:bg-white/20 transition-all uppercase tracking-widest text-sm flex items-center justify-center gap-3 cursor-pointer">
                    Apri nel Browser
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </a>
        </div>

        <div class="mt-10 text-center opacity-30">
            <p class="text-[9px] font-black uppercase tracking-[0.3em]">Powered by 01Informatica</p>
        </div>
    </div>

    <script>
        // Logica per rilevare il sistema operativo
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const iosBox = document.getElementById('ios-instructions');
        const installBtn = document.getElementById('install-button');

        if (isIOS) {
            iosBox.classList.remove('hidden');
        }

        // Logica per Android / Chrome
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            console.log('beforeinstallprompt event fired');
            e.preventDefault(); 
            deferredPrompt = e;
            installBtn.classList.remove('hidden'); 
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('User accepted the install prompt');
                }
                deferredPrompt = null;
                installBtn.classList.add('hidden');
            }
        });

        // Nasconde il pulsante se l'app è già installata
        window.addEventListener('appinstalled', () => {
            installBtn.classList.add('hidden');
            deferredPrompt = null;
        });
    </script>
</body>
</html>
